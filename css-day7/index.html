<!DOCTYPE html>
<html>
    <head>
        <title>Navbar project </title>
    </head>
    <style>
        nav{background-color: black;
        color: white;
        display: flex;
        justify-content: space-between;
        transition: 0.3s;
        padding: 10px;
        border-radius: 15px;
        align-items: center;}

        .navbar:hover{transform: scale(1.06);}

        .nav-links a{color: white;}

        .nav-links a:hover{color: yellow;}

        .navbar:hover{transform: scale(1.06);}
    </style>
    <body>
        <nav class="navbar">
            <h2>Navbar practice</h2>
            <div class="nav-links">

                <a href="#">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">PROJECT</a>
                <a href="#">CONTACT</a>

            </div>
        </nav>
    </body>
</html>
