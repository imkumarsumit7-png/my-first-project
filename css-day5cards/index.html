<!DOCTYPE html>
<html>
    <head>
        <title>Making of a card</title>
    </head>
    <style>
        body{background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;}
        .card{background-color: white;
        border-radius: 15px;
        box-shadow: 0px 5px 15px gray;
        text-align: center;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 300px;
        height: 100vh;
        justify-content: center;
        align-items: center;}
        .card:hover{transform: scale(1.05);}
        button:hover{transform: scale(1.20);}
        button{transition: 0.3s;
        margin: 30px;}
    </style>
    <body>
        <div class="card">
            <h1>Sumit Kumar</h1>
            <h2>Future Web developer</h2>
            <p>Learning HTML and CSS</p>
            <button>CONTACT ME</button>
        </div>
    </body>
</html>
