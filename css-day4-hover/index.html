<!DOCTYPE html>
<html>
    <head>
        <title>Hover effects</title>
    </head>
    <style>
        body{background: linear-gradient(45deg, black, mediumslateblue);
        text-align: center;}
        h1{color: darkblue;}
        button{background-color: black;
        color: white;
        width: 150px;
        height: 50px;
        border-color: mediumslateblue;
        border-width: 2px;
        border-radius: 4px;
        font-size: 18px;
        font-style: italic;
        transition: 0.3s;
        cursor: pointer;
        box-shadow: 0px 5px 10px gray;}
        button:hover{
    background-color: grey;
    color: antiquewhite;
    transform: scale(1.1);
    border-radius: 15px;
    box-shadow: 10px 10px 20px gray;}
    </style>
    <body>
        <h1>Hover effects</h1>

        <button>Hover Me!</button>
    </body>
</html>
